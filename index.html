<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
      --done: #333;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 600px;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    header h1 span {
      color: var(--accent);
    }

    .stats {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder { color: var(--muted); }

    .input-row button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0f0f0f;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 0 20px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .input-row button:hover { opacity: 0.85; }
    .input-row button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 14px;
      padding: 14px 16px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .item.done {
      opacity: 0.45;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item .check {
      appearance: none;
      background: transparent;
      border: 2px solid var(--muted);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      height: 22px;
      width: 22px;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .item .check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .item .check:checked::after {
      content: '';
      position: absolute;
      left: 5px; top: 2px;
      width: 5px; height: 9px;
      border: 2px solid #0f0f0f;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .item .label {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      outline: none;
      cursor: text;
      word-break: break-word;
    }

    .item.done .label {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item .del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .item:hover .del { opacity: 1; }
    .item .del:hover { color: #ff6b6b; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      padding: 48px 0;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      margin-top: 24px;
      display: block;
      margin-left: auto;
      padding: 6px 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #ff6b6b; }
    .clear-btn:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Check<span>list</span></h1>
    <p class="stats" id="stats">0 tasks</p>
  </header>

  <div class="input-row">
    <input type="text" id="input" placeholder="Add a task..." maxlength="200" autocomplete="off" />
    <button onclick="addItem()" title="Add">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">ACTIVE</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">DONE</button>
  </div>

  <div class="list" id="list"></div>
  <button class="clear-btn" id="clearBtn" onclick="clearDone()">CLEAR COMPLETED</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('checklist') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('checklist', JSON.stringify(items));
    render();
  }

  function addItem() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    items.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) item.done = !item.done;
    save();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
  }

  function updateText(id, text) {
    const item = items.find(i => i.id === id);
    if (item) item.text = text;
    save();
  }

  function clearDone() {
    items = items.filter(i => !i.done);
    save();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('list');
    const stats = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    const done = items.filter(i => i.done).length;
    const total = items.length;
    stats.textContent = total === 0 ? 'no tasks yet' : `${done}/${total} done`;

    const visible = items.filter(i => {
      if (filter === 'active') return !i.done;
      if (filter === 'done') return i.done;
      return true;
    });

    clearBtn.disabled = done === 0;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty">— ${filter === 'done' ? 'nothing completed' : filter === 'active' ? 'all done!' : 'add something'} —</div>`;
      return;
    }

    list.innerHTML = visible.map(item => `
      <div class="item ${item.done ? 'done' : ''}" data-id="${item.id}">
        <input type="checkbox" class="check" ${item.done ? 'checked' : ''} onchange="toggleItem(${item.id})" />
        <span class="label" contenteditable="true" onblur="updateText(${item.id}, this.textContent.trim())"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${escHtml(item.text)}</span>
        <button class="del" onclick="deleteItem(${item.id})" title="Delete">✕</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  render();
</script>
</body>
</html>
