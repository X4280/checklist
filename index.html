<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--border:#282828;--border2:#333;--accent:#e8ff47;--text:#efefef;--muted:#555;--muted2:#3a3a3a;--danger:#ff5a5a;--radius:10px;--sidebar:240px}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;overflow:hidden}
    /* SIDEBAR */
    .sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
    .sidebar-header{padding:28px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sidebar-header h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.03em}
    .sidebar-header h1 span{color:var(--accent)}
    .sidebar-section{padding:14px 12px 8px}
    .sidebar-section.bottom{margin-top:auto;border-top:1px solid var(--border)}
    .sidebar-label{font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.13em;color:var(--muted);padding:0 8px;margin-bottom:6px;text-transform:uppercase}
    .nav-item{align-items:center;background:none;border:none;border-radius:8px;color:var(--muted);cursor:pointer;display:flex;font-family:'Syne',sans-serif;font-size:.87rem;gap:10px;padding:9px 10px;text-align:left;transition:background .15s,color .15s;width:100%}
    .nav-item:hover{background:var(--surface2);color:var(--text)}
    .nav-item.active{background:var(--accent);color:#0c0c0c;font-weight:700}
    .nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .nav-item .count{margin-left:auto;font-family:'DM Mono',monospace;font-size:.68rem;opacity:.55}
    .add-btn-side{align-items:center;background:none;border:1.5px dashed var(--muted2);border-radius:8px;color:var(--muted);cursor:pointer;display:flex;font-family:'DM Mono',monospace;font-size:.68rem;gap:8px;letter-spacing:.06em;padding:8px 10px;margin-top:4px;transition:all .15s;width:100%}
    .add-btn-side:hover{border-color:var(--accent);color:var(--accent)}
    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .topbar{border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:14px 28px;flex-shrink:0;background:var(--bg)}
    #topbar-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:none}
    .topbar h2{font-size:1.25rem;font-weight:800;letter-spacing:-.02em;flex:1}
    .filter-pills{display:flex;gap:6px}
    .pill{background:none;border:1.5px solid var(--border2);border-radius:50px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.09em;padding:5px 13px;transition:all .15s}
    .pill:hover,.pill.active{border-color:var(--accent);color:var(--accent)}
    .content{flex:1;overflow-y:auto;padding:24px 28px 60px}
    /* ADD ROW */
    .add-task-row{display:flex;gap:8px;margin-bottom:22px}
    .add-task-row input,.add-task-row select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color .2s}
    .add-task-row input{flex:1;font-family:'Syne',sans-serif;font-size:.88rem;padding:11px 15px}
    .add-task-row input::placeholder{color:var(--muted)}
    .add-task-row input:focus,.add-task-row select:focus{border-color:var(--accent)}
    .add-task-row select{padding:0 10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.7rem}
    .add-main-btn{background:var(--accent);border:none;border-radius:var(--radius);color:#0c0c0c;cursor:pointer;font-size:1.4rem;font-weight:700;padding:0 18px;transition:opacity .15s,transform .1s}
    .add-main-btn:hover{opacity:.85}
    .add-main-btn:active{transform:scale(.95)}
    .toolbar{display:flex;justify-content:flex-end;margin-bottom:18px}
    .toolbar button{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;padding:5px 12px;transition:all .15s}
    .toolbar button:hover{border-color:var(--danger);color:var(--danger)}
    /* TIER GROUPS */
    .tier-group{margin-bottom:30px}
    .tier-header{align-items:center;display:flex;gap:10px;margin-bottom:10px}
    .tier-badge{align-items:center;background:var(--surface);border-radius:6px;display:inline-flex;gap:7px;padding:4px 10px 4px 8px;flex-shrink:0}
    .tier-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .tier-name{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
    .tier-line{flex:1;height:1px;background:var(--border)}
    .tier-count{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--muted);flex-shrink:0}
    /* TASK */
    .task-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;transition:border-color .2s;animation:slideIn .18s ease}
    .task-item:hover{border-color:var(--border2)}
    .task-item.done-task{opacity:.38}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .task-row{align-items:center;display:flex;gap:12px;padding:12px 14px}
    .check{appearance:none;background:transparent;border:2px solid var(--muted);border-radius:50%;cursor:pointer;flex-shrink:0;height:20px;width:20px;position:relative;transition:all .15s}
    .check:checked{background:var(--accent);border-color:var(--accent)}
    .check:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:9px;border:2px solid #0c0c0c;border-top:none;border-left:none;transform:rotate(45deg)}
    .task-label{flex:1;font-size:.9rem;line-height:1.4;outline:none;cursor:text;word-break:break-word}
    .done-task .task-label{text-decoration:line-through;color:var(--muted)}
    .task-meta{align-items:center;display:flex;gap:8px;flex-shrink:0}
    .acct-chip{border-radius:4px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.05em;padding:3px 7px;white-space:nowrap}
    .expand-btn{align-items:center;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;font-family:'DM Mono',monospace;font-size:.65rem;gap:5px;padding:4px 6px;border-radius:4px;transition:color .15s}
    .expand-btn:hover{color:var(--text)}
    .expand-arrow{display:inline-block;font-size:.6rem;transition:transform .2s}
    .expand-btn.open .expand-arrow{transform:rotate(90deg)}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;padding:4px 6px;border-radius:4px;opacity:0;transition:opacity .15s,color .15s}
    .task-item:hover .del-btn{opacity:1}
    .del-btn:hover{color:var(--danger)}
    /* SUBTASKS */
    .subtasks{border-top:1px solid var(--border);display:none;padding:8px 14px 12px 46px}
    .subtasks.open{display:block}
    .subtask-row{align-items:center;display:flex;gap:10px;padding:5px 0}
    .sub-check{appearance:none;background:transparent;border:1.5px solid var(--muted);border-radius:3px;cursor:pointer;flex-shrink:0;height:14px;width:14px;position:relative;transition:all .15s}
    .sub-check:checked{background:var(--accent);border-color:var(--accent)}
    .sub-check:checked::after{content:'';position:absolute;left:2.5px;top:.5px;width:3.5px;height:6.5px;border:1.5px solid #0c0c0c;border-top:none;border-left:none;transform:rotate(45deg)}
    .sub-label{flex:1;font-size:.82rem;color:#aaa;outline:none;word-break:break-word;cursor:text}
    .sub-label.done-sub{text-decoration:line-through;color:var(--muted)}
    .sub-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.72rem;padding:2px 5px;opacity:0;border-radius:3px;transition:opacity .15s,color .15s}
    .subtask-row:hover .sub-del{opacity:1}
    .sub-del:hover{color:var(--danger)}
    .add-sub-row{display:flex;gap:7px;margin-top:6px}
    .add-sub-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Syne',sans-serif;font-size:.78rem;padding:6px 10px;outline:none;transition:border-color .15s}
    .add-sub-row input::placeholder{color:var(--muted)}
    .add-sub-row input:focus{border-color:var(--accent)}
    .add-sub-row button{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:1rem;padding:0 10px;transition:color .15s,border-color .15s}
    .add-sub-row button:hover{color:var(--accent);border-color:var(--accent)}
    /* EMPTY */
    .empty{text-align:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:.73rem;letter-spacing:.1em;padding:60px 0}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:28px;width:360px;transform:translateY(14px);transition:transform .2s}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal h3{font-size:1.05rem;font-weight:700;margin-bottom:18px}
    .modal input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;margin-bottom:14px;transition:border-color .15s}
    .modal input:focus{border-color:var(--accent)}
    .modal-label{font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
    .color-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
    .swatch:hover{transform:scale(1.12)}
    .swatch.sel{border-color:#fff}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}
    .modal-actions button{border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;padding:10px 20px;transition:opacity .15s}
    .btn-cancel{background:var(--surface2);color:var(--muted)}
    .btn-confirm{background:var(--accent);color:#0c0c0c}
    .btn-cancel:hover,.btn-confirm:hover{opacity:.8}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><h1>Check<span>list</span></h1></div>
  <div class="sidebar-section">
    <div class="sidebar-label">Views</div>
    <button class="nav-item active" id="nav-all" onclick="selectView('all',this,null)">
      <span style="font-size:.85rem;opacity:.6">◈</span> All Tasks
      <span class="count" id="cnt-all">0</span>
    </button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Accounts</div>
    <div id="acct-nav"></div>
    <button class="add-btn-side" onclick="openModal('account')">+ Add account</button>
  </div>
  <div class="sidebar-section bottom">
    <div class="sidebar-label">Tiers</div>
    <div id="tier-nav"></div>
    <button class="add-btn-side" onclick="openModal('tier')">+ Add tier</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div id="topbar-dot"></div>
    <h2 id="topbar-title">All Tasks</h2>
    <div class="filter-pills">
      <button class="pill active" onclick="setStatus('all',this)">ALL</button>
      <button class="pill" onclick="setStatus('active',this)">ACTIVE</button>
      <button class="pill" onclick="setStatus('done',this)">DONE</button>
    </div>
  </div>
  <div class="content">
    <div class="add-task-row">
      <input type="text" id="task-input" placeholder="Add a task…" maxlength="250" autocomplete="off" />
      <select id="sel-account"><option value="">No account</option></select>
      <select id="sel-tier"><option value="">No tier</option></select>
      <button class="add-main-btn" onclick="addTask()">+</button>
    </div>
    <div class="toolbar"><button onclick="clearDone()">Clear completed</button></div>
    <div id="task-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Add</h3>
    <input type="text" id="modal-name" placeholder="Name…" maxlength="40" />
    <div class="modal-label">Color</div>
    <div class="color-row" id="color-row"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmModal()">Add</button>
    </div>
  </div>
</div>

<script>
  /* ── HELPERS ── */
  function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  const PALETTE=['#e8ff47','#ff5a5a','#5af5a0','#5ab4ff','#ff9f43','#c77dff','#f8a5c2','#00cec9','#fd79a8','#a29bfe','#ffd32a','#0be881'];

  /* ── STATE ── */
  function loadState(){
    try{
      const raw=localStorage.getItem('clv2');
      if(raw){const p=JSON.parse(raw);if(p&&Array.isArray(p.tasks))return p;}
    }catch(e){}
    return{
      accounts:[],
      tiers:[
        {id:uid(),name:'Urgent',color:'#ff5a5a'},
        {id:uid(),name:'Today',color:'#ff9f43'},
        {id:uid(),name:'Tomorrow',color:'#e8ff47'},
        {id:uid(),name:'This Week',color:'#5ab4ff'},
        {id:uid(),name:'Backlog',color:'#a29bfe'}
      ],
      tasks:[]
    };
  }

  const S=loadState();
  S.tasks.forEach(t=>{if(!Array.isArray(t.subtasks))t.subtasks=[];});
  function persist(){localStorage.setItem('clv2',JSON.stringify(S));}
  function findTask(id){return S.tasks.find(t=>t.id===id);}

  /* ── VIEW STATE ── */
  let viewType='all',viewId=null,statusFilter='all';
  const expanded=new Set();

  /* ── NAVIGATION ── */
  function selectView(type,btn,id){
    viewType=type;viewId=id;
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const dot=document.getElementById('topbar-dot');
    const title=document.getElementById('topbar-title');
    if(type==='all'){
      dot.style.display='none';
      title.textContent='All Tasks';
    }else if(type==='account'){
      const a=S.accounts.find(a=>a.id===id);
      dot.style.display='block';dot.style.background=a.color;
      title.textContent=a.name;
    }else{
      const t=S.tiers.find(t=>t.id===id);
      dot.style.display='block';dot.style.background=t.color;
      title.textContent=t.name;
    }
    render();
  }

  function setStatus(s,btn){
    statusFilter=s;
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  /* ── RENDER ── */
  function render(){renderSidebar();renderSelects();renderList();}

  function renderSidebar(){
    document.getElementById('cnt-all').textContent=S.tasks.filter(t=>!t.done).length;

    document.getElementById('acct-nav').innerHTML=S.accounts.map(a=>{
      const cnt=S.tasks.filter(t=>t.accountId===a.id&&!t.done).length;
      const active=viewType==='account'&&viewId===a.id;
      return `<button class="nav-item${active?' active':''}" onclick="selectView('account',this,'${a.id}')">
        <span class="dot" style="background:${a.color}"></span>${esc(a.name)}<span class="count">${cnt}</span>
      </button>`;
    }).join('');

    document.getElementById('tier-nav').innerHTML=S.tiers.map(t=>{
      const cnt=S.tasks.filter(tk=>tk.tierId===t.id&&!tk.done).length;
      const active=viewType==='tier'&&viewId===t.id;
      return `<button class="nav-item${active?' active':''}" onclick="selectView('tier',this,'${t.id}')">
        <span class="dot" style="background:${t.color}"></span>${esc(t.name)}<span class="count">${cnt}</span>
      </button>`;
    }).join('');
  }

  function renderSelects(){
    const sA=document.getElementById('sel-account');
    const sT=document.getElementById('sel-tier');
    const pA=sA.value,pT=sT.value;
    sA.innerHTML='<option value="">No account</option>'+
      S.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('');
    sT.innerHTML='<option value="">No tier</option>'+
      S.tiers.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
    sA.value=(viewType==='account')?viewId:pA;
    sT.value=(viewType==='tier')?viewId:pT;
  }

  function getVisible(){
    let tasks=S.tasks;
    if(viewType==='account')tasks=tasks.filter(t=>t.accountId===viewId);
    if(viewType==='tier')tasks=tasks.filter(t=>t.tierId===viewId);
    if(statusFilter==='active')tasks=tasks.filter(t=>!t.done);
    if(statusFilter==='done')tasks=tasks.filter(t=>t.done);
    return tasks;
  }

  function renderList(){
    const el=document.getElementById('task-list');
    const tasks=getVisible();
    if(!tasks.length){el.innerHTML='<div class="empty">— nothing here yet —</div>';return;}

    const tierOrder=[...S.tiers.map(t=>t.id),null];
    let html='';
    for(const tid of tierOrder){
      const group=tasks.filter(t=>(t.tierId||null)===tid);
      if(!group.length)continue;
      const tier=S.tiers.find(t=>t.id===tid);
      const color=tier?tier.color:'#555';
      const label=tier?tier.name:'No Tier';
      const doneC=group.filter(t=>t.done).length;
      html+=`<div class="tier-group">
        <div class="tier-header">
          <div class="tier-badge">
            <span class="tier-dot" style="background:${color}"></span>
            <span class="tier-name" style="color:${color}">${esc(label)}</span>
          </div>
          <div class="tier-line"></div>
          <span class="tier-count">${doneC}/${group.length}</span>
        </div>
        ${group.map(t=>taskHTML(t)).join('')}
      </div>`;
    }
    el.innerHTML=html;
    bindListeners();
  }

  function taskHTML(t){
    const acct=S.accounts.find(a=>a.id===t.accountId);
    const isOpen=expanded.has(t.id);
    const dc=t.subtasks.filter(s=>s.done).length;
    const tc=t.subtasks.length;
    return `<div class="task-item${t.done?' done-task':''}" data-id="${t.id}">
      <div class="task-row">
        <input type="checkbox" class="check js-check" data-id="${t.id}"${t.done?' checked':''}/>
        <span class="task-label" contenteditable="true" data-id="${t.id}"
          onblur="saveTLabel(this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(t.text)}</span>
        <div class="task-meta">
          ${acct?`<span class="acct-chip" style="background:${acct.color}22;color:${acct.color}">${esc(acct.name)}</span>`:''}
          <button class="expand-btn js-expand${isOpen?' open':''}" data-id="${t.id}">
            <span class="expand-arrow">&#9658;</span>
            ${tc?`<span>${dc}/${tc}</span>`:''}
          </button>
          <button class="del-btn js-del" data-id="${t.id}">&#10005;</button>
        </div>
      </div>
      <div class="subtasks${isOpen?' open':''}">
        ${t.subtasks.map((s,i)=>`
          <div class="subtask-row">
            <input type="checkbox" class="sub-check js-scheck" data-tid="${t.id}" data-i="${i}"${s.done?' checked':''}/>
            <span class="sub-label${s.done?' done-sub':''}" contenteditable="true"
              onblur="saveSubLabel(this,'${t.id}',${i})"
              onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(s.text)}</span>
            <button class="sub-del js-sdel" data-tid="${t.id}" data-i="${i}">&#10005;</button>
          </div>`).join('')}
        <div class="add-sub-row">
          <input class="js-sinput" data-tid="${t.id}" type="text" placeholder="Add subtask…" maxlength="200"/>
          <button class="js-sadd" data-tid="${t.id}">+</button>
        </div>
      </div>
    </div>`;
  }

  function bindListeners(){
    document.querySelectorAll('.js-check').forEach(el=>{
      el.addEventListener('change',()=>{
        const t=findTask(el.dataset.id);
        if(t){t.done=el.checked;persist();render();}
      });
    });
    document.querySelectorAll('.js-expand').forEach(el=>{
      el.addEventListener('click',()=>{
        const id=el.dataset.id;
        expanded.has(id)?expanded.delete(id):expanded.add(id);
        render();
      });
    });
    document.querySelectorAll('.js-del').forEach(el=>{
      el.addEventListener('click',()=>{
        S.tasks=S.tasks.filter(t=>t.id!==el.dataset.id);
        expanded.delete(el.dataset.id);
        persist();render();
      });
    });
    document.querySelectorAll('.js-scheck').forEach(el=>{
      el.addEventListener('change',()=>{
        const t=findTask(el.dataset.tid);
        if(t){t.subtasks[+el.dataset.i].done=el.checked;persist();render();}
      });
    });
    document.querySelectorAll('.js-sdel').forEach(el=>{
      el.addEventListener('click',()=>{
        const t=findTask(el.dataset.tid);
        if(t){t.subtasks.splice(+el.dataset.i,1);persist();render();}
      });
    });
    document.querySelectorAll('.js-sadd').forEach(el=>{
      el.addEventListener('click',()=>addSub(el.dataset.tid));
    });
    document.querySelectorAll('.js-sinput').forEach(el=>{
      el.addEventListener('keydown',e=>{
        if(e.key==='Enter'){e.preventDefault();addSub(el.dataset.tid);}
      });
    });
  }

  /* ── ACTIONS ── */
  function addTask(){
    const inp=document.getElementById('task-input');
    const text=inp.value.trim();
    if(!text)return;
    S.tasks.unshift({
      id:uid(),text,done:false,
      accountId:document.getElementById('sel-account').value||null,
      tierId:document.getElementById('sel-tier').value||null,
      subtasks:[]
    });
    inp.value='';persist();render();
  }

  function addSub(tid){
    const inp=document.querySelector(`.js-sinput[data-tid="${tid}"]`);
    const text=inp?inp.value.trim():'';
    if(!text)return;
    const t=findTask(tid);
    if(t){t.subtasks.push({id:uid(),text,done:false});persist();render();}
  }

  function saveTLabel(el){
    const t=findTask(el.dataset.id);
    if(t){t.text=el.textContent.trim()||t.text;persist();}
  }

  function saveSubLabel(el,tid,idx){
    const t=findTask(tid);
    if(t){t.subtasks[idx].text=el.textContent.trim()||t.subtasks[idx].text;persist();}
  }

  function clearDone(){S.tasks=S.tasks.filter(t=>!t.done);persist();render();}

  /* ── MODAL ── */
  let mMode='account',mColor=PALETTE[0];

  function openModal(mode){
    mMode=mode;mColor=PALETTE[0];
    document.getElementById('modal-title').textContent=mode==='account'?'Add Account':'Add Tier';
    document.getElementById('modal-name').value='';
    document.getElementById('color-row').innerHTML=PALETTE.map((c,i)=>
      `<span class="swatch${i===0?' sel':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></span>`
    ).join('');
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('modal-name').focus(),80);
  }

  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

  function pickColor(el,c){
    mColor=c;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel'));
    el.classList.add('sel');
  }

  function confirmModal(){
    const name=document.getElementById('modal-name').value.trim();
    if(!name)return;
    const item={id:uid(),name,color:mColor};
    if(mMode==='account')S.accounts.push(item);
    else S.tiers.push(item);
    persist();render();closeModal();
  }

  document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  document.getElementById('modal-name').addEventListener('keydown',e=>{
    if(e.key==='Enter')confirmModal();
    if(e.key==='Escape')closeModal();
  });

  /* ── BOOT ── */
  render();
</script>
</body>
</html>
